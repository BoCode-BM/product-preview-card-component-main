<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <main class="page">
      <section class="product">
        <article class="product-card">
          <picture class="product-card__media">
            <source
              srcset="/images/image-product-desktop.jpg"
              media="(min-width: 768px)"
            />
            <img
              src="/images/image-product-mobile.jpg"
              alt="Gabrielle Essence Eau De Parfum"
              class="product-card__image"
            />
          </picture>
          <div class="product-card__content">
            <p class="product-card__category">Perfume</p>
            <h1 class="product-card__title">Gabrielle Essence Eau De Parfum</h1>
            <p class="product-card__description">
              A floral, solar and voluptuous interpretation composed by Olivier
              Polge, Perfumer-Creator for the House of CHANEL.
            </p>
            <p class="product-card__price">
              <strong class="product-card__new-price">$149.99</strong>
              <del class="product-card__old-price">$169.99</del>
            </p>
            <button class="product-card__button">Add to Cart</button>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
